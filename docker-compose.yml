services:
  db:
    image: postgres:16-alpine
    container_name: rotakids-db
    environment:
      POSTGRES_USER: rotakids
      POSTGRES_PASSWORD: rotakids
      POSTGRES_DB: rotakids
    volumes:
      - rotakids-data:/var/lib/postgresql/data
      # Cria as tabelas automaticamente na primeira subida:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotakids"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: rotakids-app
    environment:
      PORT: 3000
      DATABASE_URL: postgres://rotakids:rotakids@db:5432/rotakids
      JWT_SECRET: troque-esta-chave-em-producao
    ports:
      - "3000:3000"   # acesse em http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rotakids-data:
