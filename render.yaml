# ============================================================
#  render.yaml — deploy do RotaKids no Render (Blueprint)
#
#  Sobe DUAS coisas de uma vez:
#    1. o backend Node/TypeScript (web service)
#    2. um PostgreSQL gerenciado (free)
#
#  Como usar (passo a passo completo no README-DEPLOY.md):
#    Render → New → Blueprint → conecte o repo Guilherme-vss/rotakids → Apply.
#  O Render lê este arquivo, cria tudo e conecta o banco ao backend sozinho.
# ============================================================

databases:
  - name: rotakids-db
    plan: free
    databaseName: rotakids
    user: rotakids

services:
  - type: web
    name: rotakids-api
    runtime: node
    plan: free
    # O front é servido pelo GitHub Pages; aqui é só a API.
    # --include=dev é ESSENCIAL: o build precisa do TypeScript (devDependency),
    # e como definimos NODE_ENV=production, sem esta flag o npm pularia as
    # devDependencies e o `tsc` sumiria → build quebra. Foi o bug do 1º deploy.
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/saude
    envVars:
      # O Render injeta a URL do banco criado acima automaticamente.
      - key: DATABASE_URL
        fromDatabase:
          name: rotakids-db
          property: connectionString
      - key: PGSSL
        value: "true"
      # Troque por um segredo forte no painel do Render (não versione aqui).
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
